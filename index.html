<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Сортировка чисел">
    <title>Сортировка</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Сортировка чисел</h1>
        <p>Введите 10 чисел, нажмите «Сортировать» и увидите результат</p>
    </header>

    <main>
        <!-- ====== Таблица ввода ====== -->
        <section>
            <h2>Введите числа</h2>
            <table class="input-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Число</th>
                    </tr>
                </thead>
                <tbody id="inputBody">
                    <!-- генерируется через JS -->
                </tbody>
            </table>
            <button id="sortBtn" class="btn">Сортировать</button>
        </section>

        <!-- ====== Таблица результата ====== -->
        <section>
            <h2>Отсортированный результат</h2>
            <table class="output-table">
                <thead>
                    <tr>
                        <th>Позиция</th>
                        <th>Число</th>
                    </tr>
                </thead>
                <tbody id="outputBody">
                    <tr><td colspan="2">Нажмите «Сортировать» для отображения</td></tr>
                </tbody>
            </table>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Мой проект. Все права защищены.</p>
    </footer>

    <script src="script.js" defer></script>
</body>
</html>
